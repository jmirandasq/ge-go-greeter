name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ge-infra-greeter
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Update canary image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          sed -i "s|image: ghcr.io/.*:.*|image: ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:canary|" k8s/deployment-canary.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment-canary.yaml
          git diff --cached --quiet || git commit -m "chore: update canary deployment to latest canary image"
          git push
