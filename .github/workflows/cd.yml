name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag de la imagen a desplegar (ej: sha-a1b2c3d)'
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ge-infra-greeter
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=sha-$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Update image tag
        run: |
          sed -i "s|image: ghcr.io/.*/go-app:.*|image: ghcr.io/${{ github.repository_owner }}/go-app:${{ steps.tag.outputs.value }}|" k8s/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update go-app image to ${{ steps.tag.outputs.value }}"
          git push
