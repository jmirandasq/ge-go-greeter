name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    environment: test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ge-infra-greeter
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=canary" >> $GITHUB_OUTPUT
          else
            echo "value=sha-$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Update canary image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          sed -i "s|image: ghcr.io/.*:.*|image: ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${{ steps.tag.outputs.value }}|" k8s/deployment-canary.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment-canary.yaml
          git diff --cached --quiet || git commit -m "chore: update canary image to ${{ steps.tag.outputs.value }}"
          git push
