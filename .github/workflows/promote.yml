name: Promote to Stable

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  promote:
    name: Promote canary to stable
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get canary sha tag
        id: tag
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:canary
          SHA=$(docker inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:canary \
            --format='{{index .RepoDigests 0}}' | cut -d'@' -f2 | cut -c8-14)
          echo "value=sha-${SHA}" >> $GITHUB_OUTPUT

      - name: Re-tag canary as stable
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:canary \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ge-infra-greeter
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Update stable deployment
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          sed -i "s|image: ghcr.io/.*:.*|image: ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${{ steps.tag.outputs.value }}|" k8s/deployment-stable.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment-stable.yaml
          git diff --cached --quiet || git commit -m "chore: promote canary to stable (${{ steps.tag.outputs.value }})"
          git push
